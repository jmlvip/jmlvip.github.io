<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="refresh" content="0;url=https://maolin.iepose.cn/">
    <title>maolin nav</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('body-bg.jpg');
            background-size: cover;
            background-attachment: fixed;
        }


		
		/* 点此下载按钮  */
		.xiazai {
            color: #333;
            text-decoration: none;
            padding: 0.5rem 1rem;
			font-size: 1.1em;
			transition: all 0.3s ease; /* 添加过渡动画 */
			border-radius: 20px; /* 添加圆角 */
			background-color: #ffeddb;
		}
		

		.video-container {
			text-align: center;
		  max-width: 1200px;
		  margin: 0 auto;
		  padding: 3px;
		}

		.video-container a{
			font-size: 22px;
			color: #aa55ff;
			text-decoration: none;
			font-weight: 700;
		}
		.video-container a:hover{
			color: #4CAF50;
		}
		.video-container span{
			color: #00aaff;
			font-size: 20px
		}
		
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px;
            background: rgba(231, 231, 231, 0.7);
            color: #9a9a9a;
            margin-top: 50px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-container {
                flex-wrap: wrap;
            }
            
            .nav-item {
                margin: 5px;
                font-size: 0.9em;
            }

            .card-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

	
<div class="video-container">
	<br />
	<br />
	<br />
	<br />

	<a class="xiazai" href="https://maolin.iepose.cn/">maolin nav</a>
	<br><br>


</div>



    <footer class="footer">
        <p>© 2026 Mr.King</p>
    </footer>
</body>
</html>
